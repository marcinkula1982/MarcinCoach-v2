name: cross-stack-parity

on:
  pull_request:
  workflow_dispatch:

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Run parity gate (php-only capable)
        env:
          NODE_BASE: ${{ vars.PARITY_NODE_BASE }}
          PHP_BASE: ${{ vars.PARITY_PHP_BASE }}
          E2E_USERNAME: ${{ vars.PARITY_E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.PARITY_E2E_PASSWORD }}
          PHP_ONLY: ${{ vars.PARITY_PHP_ONLY }}
        run: |
          if [ -z "$PHP_BASE" ]; then
            echo "PARITY_PHP_BASE not configured; skipping."
            exit 0
          fi
          node scripts/e2e-cross-stack.mjs
