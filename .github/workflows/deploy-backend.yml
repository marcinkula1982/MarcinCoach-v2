name: deploy-backend

on:
  push:
    branches:
      - main
    paths:
      - "backend-php/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.IQHOST_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H h3.iqhs.eu >> ~/.ssh/known_hosts

      - name: Push to IQHost
        run: |
          git remote add iqhost host89998@h3.iqhs.eu:domains/coach.host89998.iqhs.pl/coach.git
          git push iqhost main --force

      - name: Run migrations
        run: |
          ssh host89998@h3.iqhs.eu \
            "cd /home/host89998/domains/api.coach.host89998.iqhs.pl/app-laravel/backend-php && php artisan migrate --force"
